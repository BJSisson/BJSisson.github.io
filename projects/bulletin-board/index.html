<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bulletin Board (Exercise)</title>
        <link href="css/setup.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet" data-meal-prep>
    </head>
    <body>
        <div id="bulletin-board">
            <!-- ADD YOUR HTML CODE INSIDE OF THIS DIV -->
            <div class="post-it pink shadow"> 
                <p>
                    &nbsp; &nbsp; &nbsp;Grocery List
                    <ul>
                        <li>Milk</li>
                        <li>Bread</li>
                        <li>Eggs</li>
                        <li>Water</li>
                    </ul>
                </p>

            </div>
            <div class="post-it white shadow">
                <img 
                    src="images/images.jpg" 
                    alt="all the jokers"
                >
            </div>
            <div class="post-it green list shadow">
                <p> 
                    F.A.I.L.
                    <br><br>
                    First
                    <br>
                    Attempt
                    <br>
                    In
                    <br>
                    Learning
                </p>
            </div>
            <div class="post-it "></div>
            <div class="post-it "></div>
            <div class="post-it aqua shadow">
                <h3>Change Your Mindset!</h3>
            </div>
            <div class="post-it blue shadow">
                <p>
                    If you get a NO as an answer, remember what it means! 
                    Next Opportunity
                </p>
            </div>
            <div class="post-it yellow shadow">
                <h3>Call Dad! He has the truck!</h3>
            </div>
        </div>
    </body>
</html>
