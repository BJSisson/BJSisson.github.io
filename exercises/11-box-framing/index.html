<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Box Framing</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div id="div-1" class="frame">
            <img src="images/dumbo.jpg">

        </div>
        <div id="div-2" class="frame">
            <img src="images/looney-tunes.jpg">

        </div>
        <div id="div-3" class="frame">
            <img src="images/speedy.jpg">

        </div>
        <div id="div-4" class="frame">
            <h1> SMILE</h1>
            <img 
                src="images/smiley.jpg"
                alt="smiley face"
                id="smiley"
            >
            <p>Your on camera!</p>
        </div>
    </body>
</html>
